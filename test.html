<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Rotating Effect</title>
    <style>
      /* Tetapan asas untuk paparan di tengah skrin */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0f0f12; /* Warna latar belakang gelap */
      }

      /* Bekas utama (Container) */
      .box {
        position: relative;
        width: 300px;
        height: 300px;
        background: #1e1e1e;
        border-radius: 200px;
        overflow: hidden; /*Memastikan kesan neon tidak terkeluar dari kotak */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Kod CSS daripada imej yang anda berikan */
      .box::before {
        content: "";
        position: absolute;
        inset: 50%;
        width: 170%; /* Disesuaikan supaya nampak cantik dalam saiz tetap */
        height: 170%;
        translate: -50% -50%;
        background: conic-gradient(
          from 0deg,
          transparent 0deg 36deg,
          #35eaff 36deg 48deg,
          transparent 48deg 126deg,
          #ff0a6c 126deg 138deg,
          transparent 138deg 216deg,
          #35eaff 216deg 228deg,
          transparent 228deg 306deg,
          #ff0a6c 306deg 318deg,
          transparent 318deg 360deg
        );
        filter: blur(5px) drop-shadow(0 0 12px #35eaff);
        animation: neon-rotate 0.1s linear infinite;
      }

      /* Batang Lolipop Putih */
      .box::after {
        content: "";
        position: absolute;
        /* Meletakkan batang di tengah dan sedikit ke bawah */
        bottom: -60px; /* Jarak batang dari bawah bulatan lolipop */
        left: 50%;
        translate: -50% 0; /* Mengimbangi kedudukan supaya betul-betul di tengah */

        width: 15px; /* Lebar batang */
        height: 120px; /* Panjang batang */
        background-color: white; /* Warna batang */

        border-radius: 5px; /* Sedikit melengkung di hujung batang */

        /* Supaya batang tidak bertindih di atas cahaya neon */
        z-index: 0;
      }

      /* Keyframes untuk animasi berputar */
      @keyframes neon-rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span
        style="
          color: white;
          z-index: 1;
          font-family: Arial, Helvetica, sans-serif;
        "
        >slepy head lee</span
      >
    </div>
  </body>
</html>
